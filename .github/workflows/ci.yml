name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1"
          no-cache: true

      - run: bun install

      - run: bun run typecheck

      - run: bun run lint

      - run: bun run test

      - name: Scrub gate
        run: |
          if grep -rn -iE \
            "alexy-os|delta5-hq|quant5-lab|ui8kit|buildy-ui|ui\.buildy\.tw|hinddy/tailwind-builder|ruvnet/ruflo|TauricResearch/TradingAgents|/tmp/donors" \
            src/ tests/ README.md CHANGELOG.md package.json SECURITY.md 2>/dev/null; then
            echo "Scrub gate failed: forbidden substring detected"
            exit 1
          fi

      - run: bun run build

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
